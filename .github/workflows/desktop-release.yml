# DyberVPN Desktop App Release
# Copyright 2026 Dyber, Inc.
#
# Builds signed Tauri installers for Windows, macOS, and Linux on tag push.

name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-desktop:
    name: Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            bundles: deb,appimage
          - platform: windows
            runner: windows-latest
            bundles: nsis,msi
          - platform: macos
            runner: macos-latest
            bundles: dmg,app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci || npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli@^2

      - name: Build Tauri app
        working-directory: desktop
        run: cargo tauri build --bundles ${{ matrix.bundles }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect artifacts (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p dist
          cp desktop/src-tauri/target/release/bundle/deb/*.deb dist/ 2>/dev/null || true
          cp desktop/src-tauri/target/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true

      - name: Collect artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          cp desktop/src-tauri/target/release/bundle/nsis/*.exe dist/ 2>/dev/null || true
          cp desktop/src-tauri/target/release/bundle/msi/*.msi dist/ 2>/dev/null || true

      - name: Collect artifacts (macOS)
        if: matrix.platform == 'macos'
        run: |
          mkdir -p dist
          cp -r desktop/src-tauri/target/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: dist/*

  # Attach desktop installers to the GitHub release
  attach-to-release:
    name: Attach to Release
    needs: [build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS-desktop.txt 2>/dev/null || true
          cat SHA256SUMS-desktop.txt

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
